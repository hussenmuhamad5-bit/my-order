<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>چوونەژوورەوە</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="modern-form">
            <div class="form-title">چوونە ژوورەوە</div>

            <!-- ئەکاونتە پاشەکەوتکراوەکان (بۆ ئاڵوگۆڕی خێرا) -->
            <div id="saved-accounts-list"></div>

            <div class="form-body">
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg fill="none" viewBox="0 0 24 24" class="input-icon"><circle stroke-width="1.5" stroke="currentColor" r="4" cy="8" cx="12"></circle><path stroke-linecap="round" stroke-width="1.5" stroke="currentColor" d="M5 20C5 17.2386 8.13401 15 12 15C15.866 15 19 17.2386 19 20"></path></svg>
                        <input id="login-code" placeholder="کۆدی کارمەند" class="form-input" type="text" autocomplete="off" />
                    </div>
                </div>
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg fill="none" viewBox="0 0 24 24" class="input-icon"><path stroke-width="1.5" stroke="currentColor" d="M12 10V14M8 6H16C17.1046 6 18 6.89543 18 8V16C18 17.1046 17.1046 18 16 18H8C6.89543 18 6 17.1046 6 16V8C6 6.89543 6.89543 6 8 6Z"></path></svg>
                        <input id="login-pass" placeholder="وشەی نهێنی" class="form-input" type="password" />
                        <button class="password-toggle" type="button" onclick="togglePassword()">
                            <svg fill="none" viewBox="0 0 24 24" class="eye-icon"><path stroke-width="1.5" stroke="currentColor" d="M2 12C2 12 5 5 12 5C19 5 22 12 22 12C22 12 19 19 12 19C5 19 2 12 2 12Z"></path><circle stroke-width="1.5" stroke="currentColor" r="3" cy="12" cx="12"></circle></svg>
                        </button>
                    </div>
                </div>
            </div>
            <button class="submit-button" id="login-btn" onclick="performLogin()"><span class="button-text">چوونە ژوورەوە</span><div class="button-glow"></div></button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        async function ensureSupabaseLoaded() {
            try {
                if (!window.supabase) {
                    await loadSupabaseScript();
                }
                if (!supabase || typeof supabase.from !== 'function') {
                    initializeSupabase();
                }
            } catch (error) {
                console.log(error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            await ensureSupabaseLoaded();

            let params = new URLSearchParams(location.search);
            let addMode = params.get('add') === '1'; // زیادکردنی ئەکاونتی نوێ (بێ ئۆتۆ-ڕیدایرێکت)

            let tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;

            if (tgUser && tgUser.id && !addMode) {
                try {
                    const { data, error } = await supabase
                        .from('employees')
                        .select('*')
                        .eq('telegram_id', String(tgUser.id));

                    if (data && data.length > 0) {
                        localStorage.setItem('myAppUser', JSON.stringify(data[0]));
                        window.location.replace("app.html");
                        return;
                    }
                } catch (e) {}
            }

            if (!addMode && localStorage.getItem('myAppUser')) {
                window.location.replace("app.html");
                return;
            }

            renderSavedAccounts();
        });

        // ============ ئەکاونتە پاشەکەوتکراوەکان (Facebook-style) ============
        function getSavedAccounts() {
            try { return JSON.parse(localStorage.getItem('savedAccounts') || '[]'); } catch (e) { return []; }
        }
        function setSavedAccounts(a) { localStorage.setItem('savedAccounts', JSON.stringify(a)); }
        function saveAccountToList(user) {
            let a = getSavedAccounts();
            let i = a.findIndex(x => x.code === user.code);
            let e = { code: user.code, full_name: user.full_name || "", role: user.role || "" };
            if (i >= 0) a[i] = e; else a.push(e);
            setSavedAccounts(a);
        }
        function removeSavedAccount(code, ev) {
            if (ev) ev.stopPropagation();
            setSavedAccounts(getSavedAccounts().filter(x => x.code !== code));
            renderSavedAccounts();
        }
        function maybeSaveAccount(user) {
            if (getSavedAccounts().some(a => a.code === user.code)) { saveAccountToList(user); return; }
            if (confirm("ئەتەوێت ئەم ئەکاونتە پاشەکەوت بکەیت بۆ ئاڵوگۆڕی خێرا؟")) saveAccountToList(user);
        }

        function renderSavedAccounts() {
            let box = document.getElementById('saved-accounts-list');
            if (!box) return;
            let accts = getSavedAccounts();
            if (accts.length === 0) { box.innerHTML = ""; return; }

            let html = `<div style="font-size:12px; color:var(--text-secondary); font-weight:700; margin-bottom:10px; text-align:center;">ئەکاونتە پاشەکەوتکراوەکان</div>`;
            accts.forEach(acc => {
                let initial = (acc.full_name || "?").trim().charAt(0) || "?";
                html += `
                <div onclick="quickLogin('${acc.code}')" style="display:flex; align-items:center; gap:10px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:10px 12px; margin-bottom:8px; cursor:pointer; transition:0.2s;">
                    <div style="width:40px; height:40px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; flex-shrink:0;">${initial}</div>
                    <div style="flex:1; min-width:0;">
                        <div style="font-size:14px; font-weight:700; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${acc.full_name || "بێ ناو"}</div>
                        <div style="font-size:11px; color:var(--text-secondary);">${acc.role || ""} · <span dir="ltr">${acc.code}</span></div>
                    </div>
                    <button onclick="removeSavedAccount('${acc.code}', event)" title="سڕینەوە" style="background:none; border:none; color:#cbd5e1; font-size:22px; cursor:pointer; padding:0 6px; line-height:1;">&times;</button>
                </div>`;
            });
            html += `<div style="text-align:center; margin:12px 0 16px 0; font-size:12px; color:var(--text-secondary);">— یان بە ئەکاونتێکی تر بچۆ ژوورەوە —</div>`;
            box.innerHTML = html;
        }

        async function quickLogin(code) {
            await ensureSupabaseLoaded();
            try {
                const { data } = await supabase.from('employees').select('*').eq('code', code).single();
                if (data) {
                    localStorage.setItem('myAppUser', JSON.stringify(data));
                    saveAccountToList(data);
                    window.location.replace('app.html');
                } else {
                    showMsg("❌ ئەم ئەکاونتە ئیتر بوونی نییە.");
                    removeSavedAccount(code);
                }
            } catch (e) {
                showMsg("❌ کێشە لە پەیوەندی ئینتەرنێت هەیە.");
            }
        }

        function showMsg(text) {
            alert(text); 
        }
        
        function togglePassword() {
            let passInput = document.getElementById("login-pass");
            passInput.type = passInput.type === "password" ? "text" : "password";
        }

        async function performLogin() {
            let code = document.getElementById('login-code').value.trim();
            let pass = document.getElementById('login-pass').value.trim();
            if(!code || !pass) { showMsg("تکایە هەردوو خانەکە پڕبکەرەوە"); return; }

            let btn = document.getElementById('login-btn');
            btn.innerHTML = "⏳ چاوەڕێ بکە..."; btn.disabled = true;

            try {
                await ensureSupabaseLoaded();
                
                if (!supabase || typeof supabase.from !== 'function') {
                    btn.innerHTML = "<span class='button-text'>چوونە ژوورەوە</span><div class='button-glow'></div>";
                    btn.disabled = false;
                    showMsg("❌ هێشتا پەیوەندی داتابەیس دروست نەبووە. تکایە چەند چرکەیەک چاوەڕێ بکە.");
                    return;
                }
            } catch (error) {
                btn.innerHTML = "<span class='button-text'>چوونە ژوورەوە</span><div class='button-glow'></div>";
                btn.disabled = false;
                showMsg("❌ کێشە لە هێنانی داتابەیس هەیە.");
                return;
            }

            try {
                const { data: users, error } = await supabase
                    .from('employees')
                    .select('*')
                    .eq('code', code);

                if (error || !users || users.length === 0) {
                    btn.innerHTML = "<span class='button-text'>چوونە ژوورەوە</span><div class='button-glow'></div>"; 
                    btn.disabled = false;
                    showMsg("❌ ئەم کۆدە بوونی نییە!");
                    return;
                }

                let user = users[0];
                let tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
                let tgId = tgUser ? String(tgUser.id) : null;
                let tgUsername = tgUser ? (tgUser.username || "") : "";
                let tgName = tgUser ? (tgUser.first_name + (tgUser.last_name ? " " + tgUser.last_name : "")) : "";

                if (!user.password || user.password.trim() === "") {
                    if (pass.length < 6 || pass.length > 15) {
                        btn.innerHTML = "<span class='button-text'>چوونە ژوورەوە</span><div class='button-glow'></div>"; 
                        btn.disabled = false;
                        showMsg("⚠️ وشەی نهێنی دەبێت لە نێوان ٦ بۆ ١٥ پیت یان ژمارە بێت!");
                        return;
                    }

                    let updateData = { password: pass };
                    if (tgId) {
                        updateData.telegram_id = tgId;
                        updateData.telegram_username = tgUsername;
                        updateData.telegram_name = tgName;
                    }

                    const { error: updateError } = await supabase
                        .from('employees')
                        .update(updateData)
                        .eq('code', code);

                    if (!updateError) {
                        user.password = pass;
                        if(tgId) user.telegram_id = tgId;
                        localStorage.setItem('myAppUser', JSON.stringify(user));
                        showMsg("✅ وشەی نهێنیت بۆ دانرا! لەمەودوا بەم وشەیە دەچیتە ژوورەوە.");
                        maybeSaveAccount(user);
                        window.location.replace("app.html");
                    } else {
                        btn.innerHTML = "<span class='button-text'>چوونە ژوورەوە</span><div class='button-glow'></div>"; 
                        btn.disabled = false;
                        showMsg("❌ کێشەیەک ڕوویدا لە خەزنکردنی وشەی نهێنی!");
                    }
                } 
                else if (user.password === pass) {
                    if (tgId && user.telegram_id !== tgId) {
                        await supabase.from('employees').update({
                            telegram_id: tgId,
                            telegram_username: tgUsername,
                            telegram_name: tgName
                        }).eq('code', code);
                        user.telegram_id = tgId;
                    }
                    localStorage.setItem('myAppUser', JSON.stringify(user));
                    maybeSaveAccount(user);
                    window.location.replace("app.html");
                }
                else {
                    btn.innerHTML = "<span class='button-text'>چوونە ژوورەوە</span><div class='button-glow'></div>"; 
                    btn.disabled = false;
                    showMsg("❌ وشەی نهێنییەکە هەڵەیە!");
                }

            } catch (err) {
                btn.innerHTML = "<span class='button-text'>چوونە ژوورەوە</span><div class='button-glow'></div>"; 
                btn.disabled = false;
                showMsg("❌ کێشە لە پەیوەندی ئینتەرنێت هەیە.");
            }
        }
    </script>
</body>
</html>
