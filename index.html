<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فۆرمی داواکاری</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); padding: 20px; margin: 0; }
        .container { max-width: 400px; margin: 0 auto; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: var(--tg-theme-hint-color, #999999); }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid var(--tg-theme-hint-color, #cccccc); border-radius: 8px; background-color: var(--tg-theme-secondary-bg-color, #f4f4f5); color: var(--tg-theme-text-color, #000000); font-size: 16px; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: var(--tg-theme-button-color, #2481cc); }
        button { width: 100%; padding: 14px; background-color: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #ffffff); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 20px;">تۆمارکردنی داواکاری</h2>

    <label for="customerName">ناوی کڕیار</label>
    <input type="text" id="customerName" placeholder="ناوی سیانی" required>

    <label for="city">شار</label>
    <select id="city">
        <option value="هەولێر">هەولێر</option>
        <option value="سلێمانی">سلێمانی</option>
        <option value="دهۆک">دهۆک</option>
        <option value="کەرکوک">کەرکوک</option>
    </select>

    <label for="item">کاڵا</label>
    <select id="item">
        <option value="">⏳ چاوەڕێ بکە، کاڵاکان دەهێنرێن...</option>
    </select>

    <label for="price">نرخی کۆتایی (بە دینار)</label>
    <input type="number" id="price" placeholder="نموونە: 25000" required>

    <label for="phone1">ژمارە مۆبایل ١</label>
    <input type="tel" id="phone1" value="0" maxlength="11" oninput="enforcePhone(this)" required>

    <label for="phone2">ژمارە مۆبایل ٢ (ئارەزوومەندانە)</label>
    <input type="tel" id="phone2" placeholder="بۆ نموونە: 0750..." maxlength="11" oninput="enforcePhone(this)">

    <button onclick="submitData()">ناردنی داواکاری</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // !!! ئەو لینکەی لە Apps Script وەرتگرت لێرە دایبنێ !!!
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtKMGXHm2XEA499c8HT9GDaSsMPQsMpTiZT56ju4LlfWw2_cOgZ-vvSOvvpXYc4nlcZQ/exec";

    // هێنانی ناوی کاڵاکان لە گۆگڵ شیتسەوە
    fetch(APPS_SCRIPT_URL, { redirect: "follow" })
        .then(response => response.json())
        .then(data => {
            let select = document.getElementById("item");
            select.innerHTML = ""; // لابردنی نوسراوی چاوەڕێکردنەکە
            data.forEach(item => {
                let option = document.createElement("option");
                option.value = item;
                option.text = item;
                select.appendChild(option);
            });
        })
        .catch(error => {
            document.getElementById("item").innerHTML = "<option value='هەڵە'>هەڵەیەک هەیە لە هێنانی کاڵاکان</option>";
        });

    // کۆنترۆڵکردنی ژمارە مۆبایل (تەنها ژمارە، وە بە سفر دەست پێبکات)
    function enforcePhone(input) {
        input.value = input.value.replace(/[^0-9]/g, ''); // ڕێگری لە پیت
        if (input.value.length > 0 && input.value[0] !== '0') {
            input.value = '0' + input.value.substring(1); // دەبێت بە سفر دەست پێبکات
        }
    }

    function submitData() {
        let customerName = document.getElementById('customerName').value.trim();
        let city = document.getElementById('city').value;
        let item = document.getElementById('item').value;
        let price = document.getElementById('price').value.trim();
        let phone1 = document.getElementById('phone1').value.trim();
        let phone2 = document.getElementById('phone2').value.trim();

        if (!customerName || !price || phone1.length < 11) {
            tg.showAlert("تکایە دڵنیابەرەوە کە خانەکان پڕن و ژمارە مۆبایلەکە ١١ ژمارەی تەواوە.");
            return;
        }

        let data = {
            customerName: customerName,
            city: city,
            item: item,
            price: price,
            phone1: phone1,
            phone2: phone2
        };

        tg.sendData(JSON.stringify(data));
        tg.close();
    }
</script>

</body>
</html>
