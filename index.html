<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فۆرمی داواکاری</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* بەکارهێنانی ڕەنگە بنەڕەتییەکانی تێلیگرام بۆ ئەوەی وەک بەشێک لە بەرنامەکە دەرکەوێت */
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 20px;">تۆمارکردنی داواکاری</h2>

    <label for="customerName">ناوی کڕیار</label>
    <input type="text" id="customerName" placeholder="ناوی سیانی کڕیار بنووسە" required>

    <label for="city">شار</label>
    <select id="city">
        <option value="هەولێر">هەولێر</option>
        <option value="سلێمانی">سلێمانی</option>
        <option value="دهۆک">دهۆک</option>
        <option value="کەرکوک">کەرکوک</option>
    </select>

    <label for="item">کاڵا</label>
    <select id="item">
        <option value="قەڵەم">قەڵەم</option>
        <option value="کاتژمێر">کاتژمێر</option>
        <option value="پێڵاو">پێڵاو</option>
    </select>

    <label for="price">نرخی کۆتایی (بە دینار)</label>
    <input type="number" id="price" placeholder="نموونە: 25000" required>

    <label for="phone1">ژمارە مۆبایل ١</label>
    <input type="tel" id="phone1" placeholder="07XXXXXXXXX" maxlength="11" required>

    <label for="phone2">ژمارە مۆبایل ٢ (ئارەزوومەندانە)</label>
    <input type="tel" id="phone2" placeholder="07XXXXXXXXX" maxlength="11">

    <button onclick="submitData()">ناردنی داواکاری</button>
</div>

<script>
    // ئامادەکردنی Web App ـەکەی تێلیگرام
    let tg = window.Telegram.WebApp;
    tg.expand(); // بۆ ئەوەی فۆرمەکە شاشەکە پڕ بکاتەوە

    function submitData() {
        // وەرگرتنی زانیارییەکان لە فۆرمەکەوە
        let customerName = document.getElementById('customerName').value.trim();
        let city = document.getElementById('city').value;
        let item = document.getElementById('item').value;
        let price = document.getElementById('price').value.trim();
        let phone1 = document.getElementById('phone1').value.trim();
        let phone2 = document.getElementById('phone2').value.trim();

        // پشکنینی پڕکردنەوەی خانە سەرەکییەکان
        if (!customerName || !price || !phone1) {
            tg.showAlert("تکایە هەموو خانە پێویستەکان پڕ بکەرەوە.");
            return;
        }

        // پشکنینی مەرجەکانی ژمارە مۆبایل (١١ ژمارە، بە سفر دەست پێبکات، تەنها ژمارە بێت)
        let phoneRegex = /^0\d{10}$/;
        if (!phoneRegex.test(phone1)) {
            tg.showAlert("ژمارە مۆبایلی یەکەم هەڵەیە! دەبێت 11 ژمارە بێت و بە 0 دەست پێبکات.");
            return;
        }

        if (phone2 && !phoneRegex.test(phone2)) {
            tg.showAlert("ژمارە مۆبایلی دووەم هەڵەیە! دەبێت 11 ژمارە بێت و بە 0 دەست پێبکات.");
            return;
        }

        // کۆکردنەوەی داتاکان لە یەک پاکێجدا
        let data = {
            customerName: customerName,
            city: city,
            item: item,
            price: price,
            phone1: phone1,
            phone2: phone2
        };

        // ناردنی داتاکە بۆ بۆتی پایتۆن و داخستنی فۆرمەکە
        tg.sendData(JSON.stringify(data));
        tg.close();
    }
</script>

</body>
</html>
